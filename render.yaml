databases:
  - name: quickpos-db
    databaseName: quickpos
    user: quickpos
    plan: free

services:
  - type: web
    name: quickpos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: quickpos-db
          property: connectionString
